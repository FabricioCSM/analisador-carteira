name: Analisador de Carteira

on:
  schedule:
    - cron: '30 11 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  analisar:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar Analisador
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python analisador_carteira.py

      - name: Commit e Push dos relatórios
        run: |
          git config user.name "Analisador Bot"
          git config user.email "bot@analisador.local"
          git add relatorios/
          git diff --staged --quiet || git commit -m "📊 Relatório $(date +'%d/%m/%Y %H:%M') BRT"
          git push
